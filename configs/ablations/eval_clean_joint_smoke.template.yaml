experiment:
  name: joint_clean_smoke
  output_dir: outputs/ablations/joint_clean_smoke
  seed: 20260721
  overwrite: false
  resume: true
  save_video: true
  save_failure_video_only: true
  log_level: INFO
hardware:
  devices: [0]
  workers_per_gpu: 1
  precision: bf16
  max_gpu_memory_gb: 23
  enable_tf32: true
checkpoint:
  # This file is intentionally not downloaded by this project. A current
  # third-party candidate is LIQIIIII/badwam-libero-joint-wam; its parity with
  # the official uncond training run is not established.
  path: checkpoints/fastwam_ablation/libero_joint_2cam224.pt
  model_name: libero_joint_2cam224_1e-4
  config_path: third_party/FastWAM/configs/sim_libero.yaml
  dataset_stats_path: checkpoints/fastwam_ablation/libero_joint_2cam224_dataset_stats.json
policy:
  variant: joint_wam
  test_time_future_imagination: true
  comparison_group: thought1_libero
  # Set the same non-empty ID on both Fast-WAM and Joint WAM only when the
  # data split, optimizer budget and training-seed protocol are proven matched.
  training_recipe_id: null
benchmark:
  backend: libero
  suite: libero_spatial
  suite_config: configs/suites/libero_spatial.yaml
  tasks: [0]
  episodes_per_task: 2
  max_steps: 400
  num_steps_wait: 30
  control_horizon: 10
  image_size: [256, 256]
perturbation:
  enabled: false
  category: []
  level: []
  parameters: {}
recording:
  fps: 24
  save_observations: false
  save_actions: true
  save_robot_state: true
  video_format: mp4
