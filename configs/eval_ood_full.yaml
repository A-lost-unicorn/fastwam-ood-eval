experiment:
  name: ood_full
  output_dir: outputs/ood_full
  seed: 20260721
  overwrite: false
  resume: true
  save_video: true
  save_failure_video_only: true
  log_level: INFO
hardware:
  devices: [0, 1, 2, 3]
  workers_per_gpu: 1
  precision: bf16
  max_gpu_memory_gb: 23
  enable_tf32: true
checkpoint:
  path: checkpoints/fastwam_release/libero_uncond_2cam224.pt
  model_name: libero_uncond_2cam224_1e-4
  config_path: third_party/FastWAM/configs/sim_libero.yaml
  dataset_stats_path: checkpoints/fastwam_release/libero_uncond_2cam224_dataset_stats.json
benchmark:
  backend: libero_plus
  suite: libero_spatial
  suite_config: configs/suites/libero_spatial.yaml
  tasks: all
  episodes_per_task: 20
  max_steps: 400
  num_steps_wait: 30
  control_horizon: 10
  image_size: [256, 256]
perturbation:
  enabled: true
  category: [camera_viewpoints, light_conditions, background_textures, robot_initial_states, objects_layout]
  level: [easy, medium, hard]
  parameters:
    classification_path: third_party/LIBERO-plus/libero/libero/benchmark/task_classification.json
recording:
  fps: 24
  save_observations: false
  save_actions: true
  save_robot_state: true
  video_format: mp4
